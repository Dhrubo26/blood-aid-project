services:
  - type: web
    name: blood-aid
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python setup_db.py
    startCommand: gunicorn --worker-class gevent --worker-connections 1000 -w 1 app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blood-aid-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: blood-aid-db
    databaseName: bloodaid
    plan: free
